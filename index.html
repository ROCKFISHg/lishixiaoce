<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Answers</title>
</head>

<body style="text-align:center;font-family:Arial;">

<h1>Daily Test Answers</h1>

<p id="date"></p>

<img id="img" style="width:80%;"><br><br>

<input id="urlInput" placeholder="Paste image URL" style="width:60%;padding:10px;"><br><br>

<input id="passwordInput" type="password" placeholder="Enter password" style="width:60%;padding:10px;"><br><br>

<button onclick="updateImage()">Update Image</button>

<p>Enter password to update image.</p>

<script>
const workerURL = "https://xiaoce.rockfish114514.workers.dev";

// 日期
const d = new Date();
document.getElementById("date").innerText =
  d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();

// 加载图片
function loadImage(){
  fetch(workerURL + "/get")
    .then(r => r.text())
    .then(url => {
      if(url) document.getElementById("img").src = url;
    });
}

// 更新图片
function updateImage(){
  let url = document.getElementById("urlInput").value;
  let password = document.getElementById("passwordInput").value;

  fetch(workerURL + "/set", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url: url, password: password })
  }).then(res => {
    if(res.status === 403){
      alert("Wrong password!");
    } else {
      loadImage();
      alert("Updated!");
    }
  });
}

loadImage();
</script>

</body>
</html>
