<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Answers</title>

<style>
body {
    margin: 0;
    background: white;
    color: black;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin-top: 40px;
}

.date {
    margin-top: 10px;
    color: #555;
}

img {
    width: 80%;
    margin-top: 30px;
    cursor: pointer;
}

button {
    margin-top: 20px;
    padding: 10px 25px;
    font-size: 16px;
    cursor: pointer;
}

/* 全屏 */
.modal {
    display: none;
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 95%;
    max-height: 95%;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Daily Test Answers</h1>

<div class="date" id="date"></div>

<img id="mainImage" src="image.jpg" alt="Daily Answer">

<br>

<button onclick="openModal()">View Fullscreen</button>

<p>Updated daily.</p>

<!-- 全屏 -->
<div id="modal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img id="modalImg">
</div>

<script>
// 日期
const today = new Date();
document.getElementById("date").innerText =
    today.getFullYear() + "-" +
    (today.getMonth()+1) + "-" +
    today.getDate();

// 全屏
function openModal() {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src =
        document.getElementById("mainImage").src;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// 点击图片也放大
document.getElementById("mainImage").onclick = openModal;
</script>

</body>
</html>
